<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background-color: #f8ece5;
}

header {
  background-color: #e27d60;
  color: #fff;
  text-align: center;
  padding: 20px;
}

.menu-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.menu-card {
  width: 300px;
  background-color: #fff;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  overflow: hidden;
  transition: transform 0.3s;
}

.menu-card:hover {
  transform: translateY(-5px);
}

.menu-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px 10px 0 0;
}

.menu-content {
  padding: 20px;
}

.menu-content h2 {
  font-size: 24px;
  margin-bottom: 10px;
  color: #e27d60;
}

.menu-content p {
  font-size: 14px;
  color: #7f7f7f;
  margin-bottom: 20px;
}

.menu-content a {
  display: inline-block;
  padding: 8px 16px;
  background-color: #e27d60;
  color: #fff;
  text-decoration: none;
  border-radius: 4px;
  transition: background-color 0.3s;
}

.menu-content a:hover {
  background-color: #bf6043;
}


</style>
